<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E72);
            bottom: 100px;
            left: 50px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .obstacle {
            position: absolute;
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            bottom: 0;
        }

        .spike {
            width: 30px;
            height: 60px;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            background: linear-gradient(135deg, #FF6B6B, #FF4757) !important;
        }

        .block {
            width: 60px;
            height: 60px;
            border-radius: 5px;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            z-index: 100;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 200;
            min-width: 300px;
        }

        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #FF6B6B;
        }

        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        #restartBtn {
            padding: 12px 30px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #restartBtn:hover {
            background: #764ba2;
        }

        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(180deg, #8B7355, #654321);
            border-top: 2px solid #333;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="ground"></div>
        <div id="score">Score: 0</div>
        <div id="instructions">
            <strong>SPACE</strong> or <strong>CLICK</strong> to Jump<br>
            Avoid obstacles!
        </div>
        <div id="player"></div>
        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        // Game variables
        let playerY = 100;
        let playerVelocity = 0;
        const gravity = 0.6;
        const jumpPower = -15;
        const groundLevel = 20;
        let isJumping = false;
        let score = 0;
        let gameOver = false;
        let difficulty = 1;

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !gameOver) {
                e.preventDefault();
                jump();
            }
        });

        gameContainer.addEventListener('click', () => {
            if (!gameOver) {
                jump();
            }
        });

        function jump() {
            if (!isJumping) {
                playerVelocity = jumpPower;
                isJumping = true;
            }
        }

        // Update player physics
        function updatePlayer() {
            playerVelocity += gravity;
            playerY += playerVelocity;

            if (playerY >= gameContainer.clientHeight - groundLevel - 40) {
                playerY = gameContainer.clientHeight - groundLevel - 40;
                isJumping = false;
                playerVelocity = 0;
            }

            player.style.bottom = playerY + 'px';
        }

        // Spawn obstacles
        function spawnObstacle() {
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';

            const isSpikeType = Math.random() > 0.4;
            let width, height;

            if (isSpikeType) {
                obstacle.classList.add('spike');
                width = 30;
                height = 60;
            } else {
                obstacle.classList.add('block');
                width = 60;
                height = Math.random() > 0.5 ? 60 : 40;
            }

            obstacle.style.width = width + 'px';
            obstacle.style.height = height + 'px';
            obstacle.style.left = gameContainer.clientWidth + 'px';

            gameContainer.appendChild(obstacle);

            let obstacleX = gameContainer.clientWidth;

            const moveObstacle = () => {
                if (gameOver) return;

                obstacleX -= 8 + difficulty;

                if (obstacleX < -width) {
                    obstacle.remove();
                    score += 10;
                    scoreDisplay.textContent = 'Score: ' + score;
                    
                    // Increase difficulty
                    if (score % 100 === 0) {
                        difficulty += 0.5;
                    }
                    
                    return;
                }

                // Collision detection
                if (checkCollision(obstacle, obstacleX, width, height)) {
                    endGame();
                    return;
                }

                obstacle.style.left = obstacleX + 'px';
                requestAnimationFrame(moveObstacle);
            };

            moveObstacle();
        }

        function checkCollision(obstacle, obstacleX, obstacleWidth, obstacleHeight) {
            const playerX = 50;
            const playerSize = 40;
            const playerBottomY = gameContainer.clientHeight - groundLevel - playerY - playerSize;
            const obstacleBottomY = gameContainer.clientHeight - groundLevel - obstacleHeight;

            return (
                playerX < obstacleX + obstacleWidth &&
                playerX + playerSize > obstacleX &&
                playerBottomY < obstacleBottomY + obstacleHeight &&
                playerBottomY + playerSize > obstacleBottomY
            );
        }

        function endGame() {
            gameOver = true;
            gameOverScreen.style.display = 'block';
            finalScoreDisplay.textContent = score;
        }

        function restart() {
            playerY = 100;
            playerVelocity = 0;
            isJumping = false;
            score = 0;
            gameOver = false;
            difficulty = 1;
            scoreDisplay.textContent = 'Score: 0';
            gameOverScreen.style.display = 'none';

            // Remove all obstacles
            const obstacles = document.querySelectorAll('.obstacle');
            obstacles.forEach(obs => obs.remove());

            gameLoop();
        }

        restartBtn.addEventListener('click', restart);

        let obstacleSpawnTimer = 0;
        function gameLoop() {
            if (!gameOver) {
                updatePlayer();

                obstacleSpawnTimer++;
                if (obstacleSpawnTimer > Math.max(60 - difficulty * 5, 30)) {
                    spawnObstacle();
                    obstacleSpawnTimer = 0;
                }

                requestAnimationFrame(gameLoop);
            }
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
