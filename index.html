<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E72);
            bottom: 100px;
            left: 50px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.05s;
        }

        .obstacle {
            position: absolute;
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            bottom: 0;
        }

        .spike {
            width: 30px;
            height: 60px;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            background: linear-gradient(135deg, #FF6B6B, #FF4757) !important;
        }

        .block {
            width: 60px;
            height: 60px;
            border-radius: 5px;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            z-index: 100;
        }

        #difficulty {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 16px;
            color: #333;
            z-index: 100;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 200;
            min-width: 300px;
        }

        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #FF6B6B;
        }

        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        #restartBtn {
            padding: 12px 30px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            margin-right: 10px;
        }

        #restartBtn:hover {
            background: #764ba2;
        }

        #pauseBtn {
            position: absolute;
            top: 20px;
            right: 120px;
            padding: 10px 20px;
            font-size: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
        }

        #pauseBtn:hover {
            background: #764ba2;
        }

        #pauseScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 200;
        }

        #pauseScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #667eea;
        }

        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(180deg, #8B7355, #654321);
            border-top: 2px solid #333;
        }

        .shake {
            animation: shake 0.2s;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 0); }
            75% { transform: translate(5px, 0); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="ground"></div>
        <div id="score">Score: 0</div>
        <div id="difficulty">Difficulty: 1.0x</div>
        <button id="pauseBtn">Pause (P)</button>
        <div id="instructions">
            <strong>SPACE</strong>, <strong>CLICK</strong>, or <strong>TOUCH</strong> to Jump<br>
            <strong>P</strong> to Pause<br>
            Avoid obstacles!
        </div>
        <div id="player"></div>
        <div id="pauseScreen">
            <h1>PAUSED</h1>
            <p>Press P or click to resume</p>
        </div>
        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            GRAVITY: 0.6,
            JUMP_POWER: -15,
            GROUND_LEVEL: 20,
            PLAYER_SIZE: 40,
            SPAWN_RATE: 60,
            MIN_SPAWN_RATE: 30,
            BASE_OBSTACLE_SPEED: 8,
            PLAYER_X: 50
        };

        // DOM Elements
        const gameContainer = document.getElementById('gameContainer');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const difficultyDisplay = document.getElementById('difficulty');
        const gameOverScreen = document.getElementById('gameOver');
        const pauseScreen = document.getElementById('pauseScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        // Game variables
        let playerY = 100;
        let playerVelocity = 0;
        let isJumping = false;
        let score = 0;
        let gameOver = false;
        let isPaused = false;
        let difficulty = 1;
        let lastJumpTime = 0;
        let obstacleSpawnTimer = 0;

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !gameOver) {
                e.preventDefault();
                jump();
            }
            if (e.code === 'KeyP') {
                togglePause();
            }
        });

        gameContainer.addEventListener('click', () => {
            if (!gameOver && !isPaused) {
                jump();
            } else if (isPaused) {
                togglePause();
            }
        });

        gameContainer.addEventListener('touchstart', () => {
            if (!gameOver && !isPaused) {
                jump();
            } else if (isPaused) {
                togglePause();
            }
        });

        pauseBtn.addEventListener('click', togglePause);

        function jump() {
            if (!isJumping && Date.now() - lastJumpTime > 100) {
                playerVelocity = CONFIG.JUMP_POWER;
                isJumping = true;
                lastJumpTime = Date.now();
            }
        }

        function togglePause() {
            if (gameOver) return;
            isPaused = !isPaused;
            pauseScreen.style.display = isPaused ? 'block' : 'none';
            pauseBtn.textContent = isPaused ? 'Resume (P)' : 'Pause (P)';
        }

        // Update player physics
        function updatePlayer() {
            playerVelocity += CONFIG.GRAVITY;
            playerY += playerVelocity;

            const maxY = gameContainer.clientHeight - CONFIG.GROUND_LEVEL - CONFIG.PLAYER_SIZE;
            if (playerY >= maxY) {
                playerY = maxY;
                isJumping = false;
                playerVelocity = 0;
            }

            player.style.bottom = playerY + 'px';
        }

        // Spawn obstacles
        function spawnObstacle() {
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';

            const isSpikeType = Math.random() > 0.4;
            let width, height;

            if (isSpikeType) {
                obstacle.classList.add('spike');
                width = 30;
                height = 60;
            } else {
                obstacle.classList.add('block');
                width = 60;
                height = Math.random() > 0.5 ? 60 : 40;
            }

            obstacle.style.width = width + 'px';
            obstacle.style.height = height + 'px';
            obstacle.style.left = gameContainer.clientWidth + 'px';

            gameContainer.appendChild(obstacle);

            let obstacleX = gameContainer.clientWidth;

            const moveObstacle = () => {
                if (gameOver || isPaused) {
                    requestAnimationFrame(moveObstacle);
                    return;
                }

                obstacleX -= CONFIG.BASE_OBSTACLE_SPEED + difficulty;

                if (obstacleX < -width) {
                    obstacle.remove();
                    score += 10;
                    scoreDisplay.textContent = 'Score: ' + score;
                    
                    // Increase difficulty
                    if (score % 100 === 0) {
                        difficulty += 0.5;
                        difficultyDisplay.textContent = 'Difficulty: ' + difficulty.toFixed(1) + 'x';
                    }
                    
                    return;
                }

                // Collision detection
                if (checkCollision(obstacle, obstacleX, width, height)) {
                    endGame();
                    return;
                }

                obstacle.style.left = obstacleX + 'px';
                requestAnimationFrame(moveObstacle);
            };

            moveObstacle();
        }

        function checkCollision(obstacle, obstacleX, obstacleWidth, obstacleHeight) {
            const playerX = CONFIG.PLAYER_X;
            const playerSize = CONFIG.PLAYER_SIZE;
            const playerBottomY = gameContainer.clientHeight - CONFIG.GROUND_LEVEL - playerY - playerSize;
            const obstacleBottomY = gameContainer.clientHeight - CONFIG.GROUND_LEVEL - obstacleHeight;

            return (
                playerX < obstacleX + obstacleWidth &&
                playerX + playerSize > obstacleX &&
                playerBottomY < obstacleBottomY + obstacleHeight &&
                playerBottomY + playerSize > obstacleBottomY
            );
        }

        function endGame() {
            gameOver = true;
            gameOverScreen.style.display = 'block';
            finalScoreDisplay.textContent = score;
            gameContainer.classList.add('shake');
            setTimeout(() => gameContainer.classList.remove('shake'), 200);
        }

        function restart() {
            playerY = 100;
            playerVelocity = 0;
            isJumping = false;
            score = 0;
            gameOver = false;
            isPaused = false;
            difficulty = 1;
            obstacleSpawnTimer = 0;
            scoreDisplay.textContent = 'Score: 0';
            difficultyDisplay.textContent = 'Difficulty: 1.0x';
            gameOverScreen.style.display = 'none';
            pauseScreen.style.display = 'none';
            pauseBtn.textContent = 'Pause (P)';

            // Remove all obstacles
            const obstacles = document.querySelectorAll('.obstacle');
            obstacles.forEach(obs => obs.remove());

            gameLoop();
        }

        restartBtn.addEventListener('click', restart);

        function gameLoop() {
            if (!gameOver) {
                if (!isPaused) {
                    updatePlayer();

                    obstacleSpawnTimer++;
                    const spawnRate = Math.max(CONFIG.SPAWN_RATE - difficulty * 5, CONFIG.MIN_SPAWN_RATE);
                    if (obstacleSpawnTimer > spawnRate) {
                        spawnObstacle();
                        obstacleSpawnTimer = 0;
                    }
                }

                requestAnimationFrame(gameLoop);
            }
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
